<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xshielder — Order Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF8;
  --sidebar: #1E2530;
  --accent: #FF6B00;
  --text: #1A1A1A;
  --text-secondary: #6B6B6B;
  --success: #2D7D46;
  --warning: #D4920B;
  --error: #C53030;
  --border: #E2E0DC;
  --white: #FFFFFF;
  --sidebar-w: 240px;
  --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
}

html, body { height: 100%; }

body {
  font-family: 'Instrument Sans', -apple-system, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  line-height: 1.5;
}

/* ── LOGIN ── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg);
}
.login-box {
  width: 360px;
  text-align: center;
}
.login-box h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--text);
  margin-bottom: 4px;
}
.login-box .login-sub {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.login-box input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
}
.login-box input:focus { border-color: var(--accent); }
.login-box .login-error {
  color: var(--error);
  font-size: 13px;
  margin-bottom: 8px;
  min-height: 20px;
}
.login-box button {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 2px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
}
.login-box button:hover { background: #e55f00; }

/* ── APP SHELL ── */
#app { display: none; height: 100vh; }
#app.active { display: flex; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar);
  color: #C8CDD3;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 4px;
}
.sidebar-header .sidebar-sub {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 2px;
}
.sidebar nav { flex: 1; padding: 12px 0; }
.sidebar nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  color: #9CA3AF;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .1s, color .1s;
}
.sidebar nav a:hover { background: rgba(255,255,255,.05); color: #E5E7EB; }
.sidebar nav a.active { color: #fff; background: rgba(255,107,0,.12); border-left: 3px solid var(--accent); }
.sidebar nav a .nav-icon { width: 18px; text-align: center; font-size: 15px; }
.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: 11px;
  color: #6B7280;
}

/* Main area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
  min-height: 52px;
}
.topbar h2 { font-size: 16px; font-weight: 700; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Prototype banner */
.proto-banner {
  position: fixed;
  top: 0; right: 0;
  background: var(--warning);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 32px;
  transform: rotate(45deg) translate(22%, -50%);
  transform-origin: top right;
  z-index: 9999;
  pointer-events: none;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--white);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color .15s;
  text-decoration: none;
}
.btn:hover { border-color: var(--text); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #e55f00; border-color: #e55f00; }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }
.btn-success:hover { background: #246a39; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px 8px; }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .3px;
}
.badge-new { background: #EBF5FF; color: #1D4ED8; }
.badge-confirmed { background: #F0F9FF; color: #0369A1; }
.badge-production { background: #FFFBEB; color: var(--warning); }
.badge-shipped { background: #F0FDF4; color: var(--success); }
.badge-delivered { background: #ECFDF5; color: #065F46; }
.cert-badge {
  display: inline-block;
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text-secondary);
  font-family: var(--mono);
}
.cert-badge.atex { border-color: #D4920B; color: #D4920B; }
.cert-badge.iecex { border-color: #0369A1; color: #0369A1; }

/* ── CARDS / TABLES ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 20px;
  margin-bottom: 16px;
}
.card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }

table { width: 100%; border-collapse: collapse; }
th, td {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
th { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); background: #F7F7F5; }
tr:hover td { background: #FAFAF5; }
tr.clickable { cursor: pointer; }

/* ── PRODUCT GRID ── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.product-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px;
  display: flex;
  flex-direction: column;
}
.product-img {
  width: 100%;
  height: 140px;
  background: #F0EFED;
  border: 1px solid var(--border);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 32px;
  color: #C4C1BC;
}
.product-sku { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.product-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
.product-certs { display: flex; gap: 4px; margin-bottom: 8px; }
.product-price { font-family: var(--mono); font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.product-card .btn { width: 100%; justify-content: center; margin-top: auto; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--white);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all .1s;
}
.filter-btn:hover { border-color: var(--text); color: var(--text); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: #FFF7F0; }

/* ── CART ── */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 100;
  display: none;
}
.cart-overlay.open { display: block; }
.cart-panel {
  position: fixed;
  top: 0; right: -480px;
  width: 480px;
  max-width: 100vw;
  height: 100vh;
  background: var(--white);
  border-left: 1px solid var(--border);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transition: right .2s ease;
}
.cart-panel.open { right: 0; }
.cart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.cart-header h3 { font-size: 15px; font-weight: 700; }
.cart-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.cart-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.cart-item:last-child { border-bottom: none; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 13px; font-weight: 600; }
.cart-item-sku { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); }
.cart-item-price { font-family: var(--mono); font-size: 13px; }
.cart-qty {
  display: flex;
  align-items: center;
  gap: 4px;
}
.cart-qty button {
  width: 24px; height: 24px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--white);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cart-qty span { font-family: var(--mono); font-size: 13px; min-width: 20px; text-align: center; }
.cart-total {
  display: flex;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
}
.cart-total .amount { font-family: var(--mono); }
.cart-currency { margin-bottom: 12px; }
.cart-currency select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: inherit;
  font-size: 13px;
  background: var(--white);
}

/* ── FORMS ── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-group { margin-bottom: 12px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 60px; }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px 20px;
}
.stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 600;
}

/* ── TIMELINE ── */
.timeline { padding-left: 20px; border-left: 2px solid var(--border); }
.timeline-entry { position: relative; padding: 0 0 20px 16px; }
.timeline-entry::before {
  content: '';
  position: absolute;
  left: -26px; top: 4px;
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid var(--white);
}
.timeline-time { font-size: 11px; color: var(--text-secondary); font-family: var(--mono); }
.timeline-text { font-size: 13px; margin-top: 2px; }
.timeline-recipient { font-size: 11px; color: var(--text-secondary); }

/* ── PO UPLOAD ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 2px;
  padding: 48px 24px;
  text-align: center;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color .15s;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); color: var(--accent); }
.drop-zone .drop-icon { font-size: 36px; margin-bottom: 8px; }
.drop-zone p { font-size: 13px; }

.ocr-progress {
  text-align: center;
  padding: 40px;
  display: none;
}
.ocr-progress .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ocr-progress p { color: var(--text-secondary); font-size: 13px; }

/* ── DOCUMENT PREVIEW ── */
.doc-preview {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 32px;
  max-width: 700px;
  margin: 0 auto;
}
.doc-preview .doc-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--text);
}
.doc-preview .doc-title { font-size: 20px; font-weight: 700; }
.doc-preview .doc-company { font-size: 12px; color: var(--text-secondary); }
.doc-preview .doc-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
.doc-preview .doc-meta span { display: block; margin-bottom: 2px; }
.doc-preview table { margin-bottom: 16px; }
.doc-preview .doc-totals { text-align: right; font-size: 13px; }
.doc-preview .doc-totals .total-line { font-size: 16px; font-weight: 700; }
.doc-preview .doc-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); }

/* ── SERIAL NUMBERS ── */
.serial-list { list-style: none; }
.serial-list li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.serial-list li:last-child { border-bottom: none; }
.serial-num { font-family: var(--mono); font-size: 12px; font-weight: 500; }

/* ── ORDER DETAIL ── */
.order-detail-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}
.order-detail-full { grid-column: 1 / -1; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  max-width: 760px;
  width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px;
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-close {
  float: right;
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text-secondary);
}

/* ── ACTIVITY FEED ── */
.activity-feed { list-style: none; }
.activity-feed li {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.activity-feed li:last-child { border-bottom: none; }
.activity-time { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); margin-right: 8px; }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }

/* ── TOAST ── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; }
.toast {
  background: var(--sidebar);
  color: #fff;
  padding: 10px 16px;
  border-radius: 2px;
  font-size: 13px;
  margin-top: 8px;
  animation: toastIn .2s ease;
  max-width: 320px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--error); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .sidebar { width: 56px; min-width: 56px; }
  .sidebar-header h1 { font-size: 0; }
  .sidebar-header h1::first-letter { font-size: 18px; }
  .sidebar-header .sidebar-sub { display: none; }
  .sidebar nav a span:not(.nav-icon) { display: none; }
  .sidebar nav a { justify-content: center; padding: 12px; }
  .sidebar-footer { display: none; }
  .order-detail-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}

/* ── MISC ── */
.hidden { display: none !important; }
.text-mono { font-family: var(--mono); }
.text-sm { font-size: 12px; }
.text-muted { color: var(--text-secondary); }
.text-right { text-align: right; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.back-link { font-size: 13px; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
</style>
</head>
<body>

<div class="proto-banner">PROTOTYPE</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h1>XSHIELDER</h1>
    <p class="login-sub">Order Portal</p>
    <div class="login-error" id="login-error"></div>
    <input type="password" id="login-pw" placeholder="Enter access code" autofocus>
    <button onclick="attemptLogin()">Access Portal</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>XSHIELDER</h1>
      <div class="sidebar-sub">Order Portal</div>
    </div>
    <nav>
      <a data-page="dashboard" class="active" onclick="navigate('dashboard')">
        <span class="nav-icon">▦</span><span>Dashboard</span>
      </a>
      <a data-page="products" onclick="navigate('products')">
        <span class="nav-icon">☐</span><span>Products</span>
      </a>
      <a data-page="orders" onclick="navigate('orders')">
        <span class="nav-icon">◫</span><span>Orders</span>
      </a>
      <a data-page="po-upload" onclick="navigate('po-upload')">
        <span class="nav-icon">⬆</span><span>PO Upload</span>
      </a>
      <a data-page="settings" onclick="navigate('settings')">
        <span class="nav-icon">⚙</span><span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      Prototype v0.1<br>exknowledge.com
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main">
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <div class="topbar-actions">
        <span id="cart-currency-label" class="text-sm text-muted text-mono">EUR</span>
        <button class="btn btn-sm" onclick="openCart()">
          🛒 Cart (<span id="cart-count">0</span>)
        </button>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </div>
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h3>Shopping Cart</h3>
    <button class="btn btn-sm" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cart-body">
    <p class="text-muted">Your cart is empty.</p>
  </div>
  <div class="cart-footer">
    <div class="cart-currency mb-8">
      <label class="text-sm text-muted">Currency: </label>
      <select id="currency-select" onchange="changeCurrency(this.value)">
        <option value="EUR">EUR — Euro</option>

// AUTH

function attemptLogin() {
  const pw = document.getElementById('login-pw').value;
  if (pw === 'xshielder2026') {
    sessionStorage.setItem('xs_auth', '1');
    showApp();
  } else {
    document.getElementById('login-error').textContent = 'Invalid access code.';
  }
}

document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  loadState();
  navigate('dashboard');
}

if (sessionStorage.getItem('xs_auth')) showApp();

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════

function navigate(page, data) {
  currentPage = page;
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  const titles = { dashboard:'Dashboard', products:'Products', orders:'Orders', 'po-upload':'PO Upload', settings:'Settings', 'order-detail':'Order Detail', checkout:'Checkout' };
  document.getElementById('page-title').textContent = titles[page] || 'Xshielder';
  const el = document.getElementById('page-content');
  switch(page) {
    case 'dashboard': renderDashboard(el); break;
    case 'products': renderProducts(el); break;
    case 'orders': renderOrders(el); break;
    case 'order-detail': renderOrderDetail(el, data); break;
    case 'po-upload': renderPOUpload(el); break;
    case 'settings': renderSettings(el); break;
    case 'checkout': renderCheckout(el); break;
  }
}

// ═══════════════════════════════════════
// CURRENCY
// ═══════════════════════════════════════

function convertPrice(eurPrice, cur) {
  cur = cur || currency;
  return eurPrice * RATES[cur];
}
function formatPrice(eurPrice, cur) {
  cur = cur || currency;
  const val = convertPrice(eurPrice, cur);
  return SYMBOLS[cur] + val.toLocaleString('en', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function changeCurrency(c) {
  currency = c;
  document.getElementById('cart-currency-label').textContent = c;
  saveState();
  renderCart();
}

// ═══════════════════════════════════════
// CART
// ═══════════════════════════════════════

function addToCart(sku) {
  const existing = cart.find(i => i.sku === sku);
  if (existing) { existing.qty++; }
  else {
    const p = PRODUCTS.find(p => p.sku === sku);
    cart.push({ sku: p.sku, name: p.name, price: p.price, qty: 1 });
  }
  saveState();
  updateCartCount();
  toast('Added to cart', 'success');
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = cart.reduce((s,i) => s + i.qty, 0);
}

function openCart() {
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

function renderCart() {
  const body = document.getElementById('cart-body');
  if (!cart.length) {
    body.innerHTML = '<p class="text-muted" style="padding:20px 0">Your cart is empty.</p>';
    document.getElementById('cart-total').textContent = formatPrice(0);
    return;
  }
  let total = 0;
  body.innerHTML = cart.map((item, i) => {
    total += item.price * item.qty;
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-sku">${item.sku}</div>
        <div class="cart-item-price">${formatPrice(item.price)} × ${item.qty}</div>
      </div>
      <div class="cart-qty">
        <button onclick="cartQty(${i},-1)">−</button>
        <span>${item.qty}</span>
        <button onclick="cartQty(${i},1)">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = formatPrice(total);
}

function cartQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  saveState();
  updateCartCount();
  renderCart();
}

function cartTotal() {
  return cart.reduce((s,i) => s + i.price * i.qty, 0);
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════

function renderDashboard(el) {
  const totalOrders = orders.length;
  const pending = orders.filter(o => ['New','Confirmed','In Production'].includes(o.status)).length;
  const thisMonth = orders.filter(o => o.date.startsWith('2026-03'));
  const revenue = thisMonth.reduce((s,o) => s + o.items.reduce((t,i) => t + i.price * i.qty, 0), 0);

  const recent = [];
  orders.forEach(o => o.log.forEach(l => recent.push({ ...l, order: o.id })));
  recent.sort((a,b) => b.time.localeCompare(a.time));

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value">${totalOrders}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value">${pending}</div></div>
      <div class="stat-card"><div class="stat-label">Revenue (Mar, EUR)</div><div class="stat-value">€${revenue.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Products</div><div class="stat-value">${PRODUCTS.length}</div></div>
    </div>
    <div class="card">
      <h3>Recent Activity</h3>
      <ul class="activity-feed">
        ${recent.slice(0,12).map(r => `<li><span class="activity-time">${r.time}</span> <strong>${r.order}</strong> — ${r.text}</li>`).join('')}
      </ul>
    </div>
  `;
}

// PRODUCTS
// ═══════════════════════════════════════

let productFilter = 'All';

function renderProducts(el) {
  const categories = ['All', ...new Set(PRODUCTS.map(p => p.category))];
  const filtered = productFilter === 'All' ? PRODUCTS : PRODUCTS.filter(p => p.category === productFilter);

  el.innerHTML = `
    <div class="filter-bar">
      ${categories.map(c => `<button class="filter-btn ${c === productFilter ? 'active' : ''}" onclick="setProductFilter('${c}')">${c}</button>`).join('')}
    </div>
    <div class="product-grid">
      ${filtered.map(p => `
        <div class="product-card">
          <div class="product-img">${p.icon}</div>
          <div class="product-sku">${p.sku}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-certs">
            ${p.category === 'Cases' ? '<span class="cert-badge atex">ATEX</span><span class="cert-badge iecex">IECEx</span>' : p.sku === 'XS-ACC-CHRG' ? '<span class="cert-badge atex">ATEX</span>' : ''}
          </div>
          <div class="product-price">${formatPrice(p.price)}</div>
          <button class="btn btn-primary btn-sm" onclick="addToCart('${p.sku}')">Add to Cart</button>

      `).join('')}

function advanceStatus(orderId) {
  const o = orders.find(x => x.id === orderId);
  const idx = STATUSES.indexOf(o.status);
  if (idx < STATUSES.length - 1) {
    o.status = STATUSES[idx + 1];
    const now = new Date().toISOString().slice(0,16).replace('T',' ');
    o.log.push({ time: now, text: `Status changed to "${o.status}"`, to: o.email });
    saveState();
    navigate('order-detail', orderId);
    toast(`Status updated to ${o.status}`, 'success');
  }
}

function addSerial(orderId) {
  const o = orders.find(x => x.id === orderId);
  const sn = document.getElementById('serial-input').value.trim();
  const prod = document.getElementById('serial-product').value;
  if (!sn) return;
  o.serials.push({ sn, product: prod, status: 'Registered' });
  const now = new Date().toISOString().slice(0,16).replace('T',' ');
  o.log.push({ time: now, text: `Serial number registered: ${sn}`, to: 'System' });
  saveState();
  navigate('order-detail', orderId);
  toast('Serial number added', 'success');
}

function renderPOUpload(el) {
  el.innerHTML = `

      <h3>Upload Purchase Order</h3>
      <p class="text-sm text-muted mb-16">Upload a PDF purchase order. Our system will extract line items, quantities, and delivery details automatically.</p>

        <div class="drop-icon">📄</div>
        <p>Drag & drop a PO document here, or click to browse</p>
        <p class="text-sm text-muted mt-8">Supported: PDF, up to 10MB</p>
      </div>
      <input type="file" id="po-file" accept=".pdf" style="display:none" onchange="handlePOUpload()">
    </div>
    <div class="ocr-progress" id="ocr-progress">
      <div class="spinner"></div>
      <p id="ocr-status">Uploading document...</p>
    </div>
    <div id="po-result" class="hidden"></div>
  `;

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handlePOUpload(); });
}

function handlePOUpload() {
  document.getElementById('po-upload-area').style.display = 'none';
  const prog = document.getElementById('ocr-progress');
  prog.style.display = 'block';

  const steps = ['Uploading document...', 'Running OCR engine...', 'Extracting line items...', 'Matching SKUs to catalog...', 'Validating data...'];
  let step = 0;
  const interval = setInterval(() => {
    step++;
    if (step < steps.length) {
      document.getElementById('ocr-status').textContent = steps[step];
    } else {
      clearInterval(interval);
      prog.style.display = 'none';
      showPOResult();
    }
  }, 800);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
